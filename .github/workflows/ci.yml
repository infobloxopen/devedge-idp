name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      # NOTE: the go.mod `replace` points devedge-sdk at a local working tree.
      # CI must provide that module (checkout alongside, or drop the replace once
      # the HTTPHandlers seam is released) or the build will fail to resolve it.
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
